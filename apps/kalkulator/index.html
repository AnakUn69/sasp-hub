<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulačka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Hub theme variable defaults ── */
    :root {
      --th-bg:         #060f18;
      --th-bg-panel:   #07101c;
      --th-bg-card:    #0b1622;
      --th-bg-hover:   rgba(59,158,255,0.08);
      --th-accent:     #3b9eff;
      --th-accent-dim: rgba(59,158,255,0.15);
      --th-accent-rgb: 59,158,255;
      --th-text:       #d0e8ff;
      --th-text-mid:   #8ab8d8;
      --th-text-dim:   #3a6080;
      --th-border:     #1a3050;
      --th-font:       'Inter', sans-serif;
      --th-radius-md:  6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100vh;
      background: var(--th-bg-panel);
      color: var(--th-text);
      font-family: var(--th-font);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .calc-wrap {
      width: 100%;
      max-width: 320px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Display ─────────────────────────────────────── */
    .calc-display {
      background: var(--th-bg);
      border: 1px solid var(--th-border);
      border-radius: var(--th-radius-md);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      min-height: 80px;
    }

    #exprDisplay {
      font-size: 13px;
      color: var(--th-text-dim);
      min-height: 18px;
      word-break: break-all;
      text-align: right;
    }

    #mainDisplay {
      font-size: 32px;
      font-weight: 300;
      color: var(--th-text);
      word-break: break-all;
      text-align: right;
      line-height: 1.1;
    }

    /* ── Button grid ──────────────────────────────────── */
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .cb {
      background: var(--th-bg-card);
      border: 1px solid var(--th-border);
      border-radius: var(--th-radius-md);
      color: var(--th-text);
      font-family: var(--th-font);
      font-size: 16px;
      font-weight: 500;
      padding: 0;
      height: 52px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      user-select: none;
    }

    .cb:hover  { background: var(--th-bg-hover); border-color: rgba(var(--th-accent-rgb),0.3); }
    .cb:active { filter: brightness(1.2); }

    .cb.op {
      color: var(--th-accent);
      border-color: rgba(var(--th-accent-rgb),0.2);
    }
    .cb.op:hover { background: rgba(var(--th-accent-rgb),0.12); border-color: rgba(var(--th-accent-rgb),0.4); }

    .cb.fn {
      background: var(--th-bg);
      color: var(--th-text-mid);
      font-size: 13px;
    }
    .cb.fn:hover { background: var(--th-bg-hover); }

    .cb.eq {
      background: rgba(var(--th-accent-rgb),0.25);
      border-color: rgba(var(--th-accent-rgb),0.5);
      color: var(--th-text);
      font-size: 20px;
    }
    .cb.eq:hover  { background: rgba(var(--th-accent-rgb),0.35); }
    .cb.eq:active { filter: brightness(1.15); }

    .cb.zero { grid-column: span 2; }

    .cb.ac {
      color: #dd4a4a;
      border-color: #3a1010;
    }
    .cb.ac:hover { background: #1a0a0a; border-color: #602020; color: #ff6060; }
  </style>
</head>
<body>

<div class="calc-wrap">
  <div class="calc-display">
    <div id="exprDisplay"></div>
    <div id="mainDisplay">0</div>
  </div>

  <div class="calc-grid">
    <!-- row 1 -->
    <button class="cb fn ac" data-act="ac">AC</button>
    <button class="cb fn"    data-act="sign">+/−</button>
    <button class="cb fn"    data-act="pct">%</button>
    <button class="cb op"    data-act="op" data-val="÷">÷</button>
    <!-- row 2 -->
    <button class="cb"       data-act="digit" data-val="7">7</button>
    <button class="cb"       data-act="digit" data-val="8">8</button>
    <button class="cb"       data-act="digit" data-val="9">9</button>
    <button class="cb op"    data-act="op" data-val="×">×</button>
    <!-- row 3 -->
    <button class="cb"       data-act="digit" data-val="4">4</button>
    <button class="cb"       data-act="digit" data-val="5">5</button>
    <button class="cb"       data-act="digit" data-val="6">6</button>
    <button class="cb op"    data-act="op" data-val="−">−</button>
    <!-- row 4 -->
    <button class="cb"       data-act="digit" data-val="1">1</button>
    <button class="cb"       data-act="digit" data-val="2">2</button>
    <button class="cb"       data-act="digit" data-val="3">3</button>
    <button class="cb op"    data-act="op" data-val="+">+</button>
    <!-- row 5 -->
    <button class="cb zero"  data-act="digit" data-val="0">0</button>
    <button class="cb"       data-act="dot">.</button>
    <button class="cb eq"    data-act="eq">=</button>
  </div>
</div>

<script>
'use strict';

const mainDisp = document.getElementById('mainDisplay');
const exprDisp = document.getElementById('exprDisplay');

let current          = '0';
let stored           = null;
let pendingOp        = null;
let justCalc         = false;
let waitingForOperand = false;

function updateDisplay(val) {
  // Limit display length
  const s = String(val);
  mainDisp.textContent = s.length > 14 ? parseFloat(val).toExponential(6) : s;
}

function setExpr(s) {
  exprDisp.textContent = s || '';
}

document.querySelector('.calc-grid').addEventListener('click', e => {
  const btn = e.target.closest('.cb');
  if (!btn) return;
  const act = btn.dataset.act;
  const val = btn.dataset.val;

  switch (act) {
    case 'digit':
      if (justCalc || waitingForOperand) { current = val; justCalc = false; waitingForOperand = false; }
      else current = current === '0' ? val : current + val;
      if (current.length > 15) current = current.slice(0, 15);
      updateDisplay(current);
      break;

    case 'dot':
      if (justCalc || waitingForOperand) { current = '0.'; justCalc = false; waitingForOperand = false; }
      else if (!current.includes('.')) current += '.';
      updateDisplay(current);
      break;

    case 'op':
      justCalc = false;
      if (stored !== null && pendingOp && !waitingForOperand) {
        const res = calculate(stored, parseFloat(current), pendingOp);
        current = String(res);
        updateDisplay(current);
      }
      stored = parseFloat(current);
      pendingOp = val;
      waitingForOperand = true;
      setExpr(mainDisp.textContent + ' ' + val);
      break;

    case 'eq':
      if (pendingOp === null) break;
      const res = calculate(stored, parseFloat(current), pendingOp);
      setExpr(mainDisp.textContent + ' ' + pendingOp + ' ' + current + ' =');
      current   = String(res);
      stored    = null;
      pendingOp = null;
      justCalc  = true;
      waitingForOperand = false;
      updateDisplay(current);
      break;

    case 'ac':
      current           = '0';
      stored            = null;
      pendingOp         = null;
      justCalc          = false;
      waitingForOperand = false;
      updateDisplay('0');
      setExpr('');
      break;

    case 'sign':
      current = String(parseFloat(current) * -1);
      updateDisplay(current);
      break;

    case 'pct':
      current = String(parseFloat(current) / 100);
      updateDisplay(current);
      break;
  }
});

function calculate(a, b, op) {
  switch (op) {
    case '+': return round(a + b);
    case '−': return round(a - b);
    case '×': return round(a * b);
    case '÷': return b !== 0 ? round(a / b) : 'Chyba';
    default:  return b;
  }
}

function round(n) {
  return Math.round(n * 1e10) / 1e10;
}

// Keyboard support
document.addEventListener('keydown', e => {
  const key = e.key;
  if (key >= '0' && key <= '9') click(`digit:${key}`);
  else if (key === '.') click('dot:');
  else if (key === '+') click('op:+');
  else if (key === '-') click('op:−');
  else if (key === '*') click('op:×');
  else if (key === '/') { e.preventDefault(); click('op:÷'); }
  else if (key === 'Enter' || key === '=') click('eq:');
  else if (key === 'Escape') click('ac:');
  else if (key === 'Backspace') {
    if (current.length > 1) current = current.slice(0, -1);
    else current = '0';
    updateDisplay(current);
  }
});

function click(desc) {
  const [act, val] = desc.split(':');
  const btn = document.querySelector(`.cb[data-act="${act}"][data-val="${val}"]`)
    || document.querySelector(`.cb[data-act="${act}"]`);
  if (btn) btn.click();
}
</script>
<script src="../../js/themes.js"></script>
</body>
</html>
